{% extends "layout.html" %}

{% block main %}

    <div id="canvas" style="font-size: large">
        click to start
    </div>
    <p id="rtime" style="font-size: 100px; text-align: center;">0ms</p>
    <button id="submit">save score</button>
    
    {% if session.user_id %}
        <div class="table">
            <div id="tableText" style="font-size: 1.2rem;">{{ session.user_name }}'s previous results:</div>
            <table>
                <tr>
                    <th>average</th>
                </tr>
                {% for stat in statistics %}
                    <tr align="right">
                        <td>{{ stat.average }}ms</td>
                    </tr>
                {% endfor %}
            </table>
        </div>
    {% endif %}

{% endblock %}

{% block script %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% endblock %}
