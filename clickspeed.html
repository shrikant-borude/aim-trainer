<!DOCTYPE html>

<html lang="en">
    <head>

        <title>Aim Trainer</title>
    </head>
    <body>
        <nav>
            <div class="left-header"><a href="index.html">aim trainer</a></div>
            <div class="mid-header">
                <div class="rtt"><a href="/">reaction time test</a></div>
                <div class="flick"><a href="flicking.html">flicking</a></div>
